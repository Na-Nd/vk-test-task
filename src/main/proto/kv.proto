syntax = "proto3";

package kv;

option java_package = "ru.nand.vktesttask.proto";
option java_outer_classname = "KvProto";
option java_multiple_files = true;

service KvService {
  rpc Put    (PutRequest)    returns (PutResponse);
  rpc Get    (GetRequest)    returns (GetResponse);
  rpc Delete (DeleteRequest) returns (DeleteResponse);
  rpc Range  (RangeRequest)  returns (stream Entry);
  rpc Count  (CountRequest)  returns (CountResponse);
}

message PutRequest {
  string          key   = 1;
  optional bytes  value = 2;  // Отличить null от не передано
}

message PutResponse {}

message GetRequest {
  string key = 1;
}

message GetResponse {
  bool            found = 1;
  optional bytes  value = 2;  // Пусто, если value == null в БД
}

message DeleteRequest {
  string key = 1;
}

message DeleteResponse {}

message RangeRequest {
  string key_since = 1;
  string key_to    = 2;
}

message Entry {
  string          key   = 1;
  optional bytes  value = 2;
}

message CountRequest {}

message CountResponse {
  int64 count = 1;
}